<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>
      quack
    </title>
    <style>
      body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background-color: #111;
    }
    img {
      width: 300px;
      height: auto;
      cursor: pointer;
      transition: transform 0.2s ease;
    }
    img:active {
      transform: scale(0.95);
    }
    </style>
  </head>
  <body>
    <img src="duck.png" id="playImage" alt="duckowoeirjfieiejtfoeoej" />
    <audio id="audioPlayer" src="duck.mp3">
    </audio>
    <script>
      const image = document.getElementById(&#34;playImage&#34;);
    const audio = document.getElementById(&#34;audioPlayer&#34;);

    image.addEventListener(&#34;click&#34;, () =&gt; {
      audio.currentTime = 0;
      audio.play();
    });
    </script>
  </body>
</html>
